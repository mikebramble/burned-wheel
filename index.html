<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generic Burning Wheel Character Sheet</title>
<style>
    :root {
        --bg-color: #f7f5f0;
        --card-bg: #ffffff;
        --text-main: #2c2c2c;
        --accent: #8b2626;
        --border-color: #d1cdb7;
    }
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-color: var(--bg-color);
        color: var(--text-main);
        padding: 20px;
        line-height: 1.5;
    }
    .sheet-container {
        max-width: 1000px;
        margin: 0 auto;
        background: var(--card-bg);
        padding: 40px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        border: 1px solid var(--border-color);
        border-radius: 4px;
    }
    .header {
        border-bottom: 3px solid var(--accent);
        padding-bottom: 20px;
        margin-bottom: 20px;
        text-align: center;
    }
    .header-input {
        font-family: 'Georgia', serif;
        font-size: 2.5em;
        color: var(--accent);
        text-transform: uppercase;
        letter-spacing: 2px;
        text-align: center;
        border: none;
        border-bottom: 2px dashed var(--border-color);
        background: transparent;
        width: 80%;
        margin-bottom: 15px;
    }
    .header-input:focus { outline: none; border-bottom: 2px solid var(--accent); }
    
    .header-details {
        display: flex;
        justify-content: center;
        gap: 20px;
        font-size: 1.1em;
        flex-wrap: wrap;
    }
    .inline-input {
        border: none;
        border-bottom: 1px solid var(--border-color);
        background: transparent;
        font-family: inherit;
        font-size: inherit;
        color: inherit;
        padding: 2px 5px;
    }
    .inline-input:focus { outline: none; border-bottom: 1px solid var(--accent); }

    .grid-2col { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
    
    .section-title {
        font-family: 'Georgia', serif;
        color: var(--accent);
        border-bottom: 1px solid var(--accent);
        padding-bottom: 5px;
        margin-top: 30px;
        text-transform: uppercase;
    }
    .data-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 6px 0;
        border-bottom: 1px dashed #e0e0e0;
    }
    .bubbles { display: flex; gap: 10px; align-items: center; font-size: 0.9em; }
    .bubbles label { display: flex; align-items: center; gap: 3px; cursor: pointer; }
    
    input[type="checkbox"] { accent-color: var(--accent); cursor: pointer; width: 16px; height: 16px; }
    
    textarea {
        width: 100%;
        box-sizing: border-box;
        border: 1px solid var(--border-color);
        background: #fafafa;
        padding: 8px;
        font-family: inherit;
        border-radius: 3px;
        resize: vertical;
        min-height: 50px;
    }
    
    .bold { font-weight: bold; }
    
    .btn-clear {
        display: block;
        margin: 40px auto 0;
        padding: 10px 20px;
        background-color: var(--accent);
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-weight: bold;
    }
    .btn-clear:hover { background-color: #631b1b; }
</style>
</head>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        const pagePrefix = window.location.pathname + "_";
        const inputs = document.querySelectorAll("input, textarea");

        inputs.forEach((input, index) => {
            const id = input.id || "bw_input_" + index;
            input.id = id;
            const storageKey = pagePrefix + id;

            const savedValue = localStorage.getItem(storageKey);
            if (savedValue !== null) {
                if (input.type === "checkbox") {
                    input.checked = (savedValue === "true");
                } else {
                    input.value = savedValue;
                }
            }

            input.addEventListener("change", () => {
                if (input.type === "checkbox") {
                    localStorage.setItem(storageKey, input.checked);
                } else {
                    localStorage.setItem(storageKey, input.value);
                }
            });
            input.addEventListener("input", () => {
                if (input.type !== "checkbox") {
                    localStorage.setItem(storageKey, input.value);
                }
            });
        });
    });

    function clearData() {
        if(confirm("Are you sure you want to wipe all unsaved checkbox and text data? This cannot be undone.")) {
            const pagePrefix = window.location.pathname + "_";
            const keysToRemove = [];
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key.startsWith(pagePrefix)) {
                    keysToRemove.push(key);
                }
            }
            keysToRemove.forEach(key => localStorage.removeItem(key));
            location.reload();
        }
    }
</script>
